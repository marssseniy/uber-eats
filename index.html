<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uber Eats</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-main">
          <div class="header-logo">
            <a href="#">UBER <span class="eats">EATS</span></a>
          </div>
          <div class="header-actions">
            <button class="header-button">Войти</button>
            <a href="#" class="basket">
              <img src="images/basket.svg" alt="Корзина" />
            </a>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <form action="#">
          <input
            type="text"
            placeholder="Поиск по ресторанам и кухням"
            class="search-input"
          />
        </form>

        <section class="restaurants">
          <h2 class="title">Рестораны в Москве</h2>

          <ul class="restaurant-cards">
            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/Macdonalds.png" alt="Ресторан Макдоналдс" />
                  <figcaption>
                    <h3 class="restaurant-name">Макдоналдс - Газетный</h3>
                    <p class="restaurant-info">
                      &#8381;&#8381; &#8226; Бургеры
                    </p>
                    <p class="waiting-time">25 - 30 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>

            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/DimSum.png" alt="Ресторан DimSum" />
                  <figcaption>
                    <h3 class="restaurant-name">DimSum & Co - ЦДМ</h3>
                    <p class="restaurant-info">
                      ₽ • Японская • Китайская • Азиатская
                    </p>
                    <p class="waiting-time">40 - 50 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>

            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/Dvizhok.png" alt="Ресторан ДвижОК" />
                  <figcaption>
                    <h3 class="restaurant-name">ДвижОК - Манежная</h3>
                    <p class="restaurant-info">
                      ₽ • Американская • Европейская
                    </p>
                    <p class="waiting-time">35 - 45 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>

            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/Nya.png" alt="Ресторан НЯ" />
                  <figcaption>
                    <h3 class="restaurant-name">НЯ - NHA</h3>
                    <p class="restaurant-info">₽₽ • Вьетнамская</p>
                    <p class="waiting-time">30 - 40 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>

            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/Dzi.png" alt='Ресторан "Точка Дзы"' />
                  <figcaption>
                    <h3 class="restaurant-name">Точка Дзы - Цветной</h3>
                    <p class="restaurant-info">₽₽ • Вьетнамская</p>
                    <p class="waiting-time">40 - 50 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>

            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/Cinnabon.png" alt="Ресторан Cinnabon" />
                  <figcaption>
                    <h3 class="restaurant-name">Cinnabon</h3>
                    <p class="restaurant-info">
                      ₽ • Выпечка • Десерты • Капкейки
                    </p>
                    <p class="waiting-time">25 - 35 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>

            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/Pizzelove.png" alt="Ресторан Pizzelove" />
                  <figcaption>
                    <h3 class="restaurant-name">PIZZELOVE</h3>
                    <p class="restaurant-info">₽₽ • Пицца</p>
                    <p class="waiting-time">15 - 25 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>

            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/Ziu.png" alt="Zю кафе на Тверской" />
                  <figcaption>
                    <h3 class="restaurant-name">Zю кафе - Тверская</h3>
                    <p class="restaurant-info">₽₽ • Японская</p>
                    <p class="waiting-time">25 - 35 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>

            <li class="card">
              <a href="restaurant.html">
                <figure>
                  <img src="images/Bbq.png" alt='Кафе "Bar BQ" на Манежной' />
                  <figcaption>
                    <h3 class="restaurant-name">Bar BQ Cafe - Манежная</h3>
                    <p class="restaurant-info">₽₽₽ • Европейская</p>
                    <p class="waiting-time">30 - 40 мин</p>
                  </figcaption>
                </figure>
              </a>
            </li>
          </ul>
        </section>
      </div>
    </main>

    <footer>
      <div class="container">
        <div class="footer-logo">
          <a href="#">UBER <span class="footer-eats">EATS</span></a>
        </div>
        <hr />
        <div class="footer-content">
          <div class="footer-info">
            <form>
              <select name="language" id="language-select">
                <option value="russian">&#x1F310; Русский</option>
                <option value="english">&#x1F310; Английский</option>
              </select>
            </form>
            <div class="social">
              <p class="hashtag"><span class="hash">#</span>UberEats</p>
              <div class="social-logo">
                <a
                  href="https://www.facebook.com/UberEats/"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <img src="images/facebook.png" alt="Facebook" />
                </a>
                <a
                  href="https://x.com/ubereats"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <img src="images/twitter.png" alt="Twitter" />
                </a>
                <a
                  href="https://www.instagram.com/ubereats"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <img src="images/instagram.png" alt="Instagram" />
                </a>
              </div>
            </div>
          </div>
          <nav class="footer-menu">
            <ul class="list-menu">
              <li><a href="#">Об UberEats</a></li>
              <li><a href="#">Станьте партнером по доставке</a></li>
              <li><a href="#">Станьте партнером-рестораном</a></li>
            </ul>
            <ul class="list-menu">
              <li><a href="#">Все города</a></li>
              <li><a href="#">Цены</a></li>
              <li><a href="#">Помощь</a></li>
              <li><a href="#">FAQs</a></li>
            </ul>
          </nav>
        </div>
        <hr />
        <div class="footer-apps">
          <a href="#"
            ><img src="images/appstore.png" alt="App Store" class="app-store"
          /></a>
          <a href="#"
            ><img
              src="images/googleplay.png"
              alt="Google Play"
              class="google-play"
          /></a>
        </div>
        <hr />
        <ul class="footer-bottom">
          <li><a href="#">© 2017 Uber Technologies Inc.</a></li>
          <li><a href="#">Обработка персональных данных</a></li>
          <li><a href="#">Пользовательское соглашение</a></li>
        </ul>
      </div>
    </footer>
    <button class="up-button"><span class="up-arrow">&#8593;</span></button>
  </body>
</html>
